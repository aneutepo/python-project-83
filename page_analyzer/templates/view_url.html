<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали URL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Детали URL</h1>

        <div data-test="url" class="card">
            <div class="card-body">
                <h5 class="card-title">ID: {{ url.id }}</h5>
                <p class="card-text"><strong>Адрес:</strong> {{ url.name }}</p>
                <p class="card-text"><strong>Дата добавления:</strong> {{ url.created_at }}</p>
            </div>
        </div>

        <a href="{{ url_for('list_urls') }}" class="btn btn-secondary mt-3">Назад к списку</a>
    </div>
</body>
</html>
